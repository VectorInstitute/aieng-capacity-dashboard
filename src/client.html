<script>
// ── Config ────────────────────────────────────────────────────────────────────
const CONFIG = {
  status: {
    committed: '#48C0D9',  // Vector Turquoise
    planned:   '#FF9E00',  // Vector Tangerine
    pipeline:  '#8A25C9',  // Vector Violet
    completed: '#9ca3af',  // Muted grey
  },
  capacity:  '#000000',    // Total capacity dashed line
  surplus: {
    pos: '#CFF933',        // Vector Lime  (positive)
    neg: '#EB088A',        // Vector Magenta (negative / over-committed)
  },
  // Categorical palette — assigned to projects in order, stable across views
  palette: [
    '#48C0D9', '#FF9E00', '#8A25C9', '#EB088A', '#313CFF', '#84CC16',
    '#06B6D4', '#D97706', '#7C3AED', '#DB2777', '#2563EB', '#16A34A',
    '#0891B2', '#B45309', '#6D28D9', '#BE185D', '#1D4ED8', '#15803D',
  ],
  tooltips: {
    totalCapacity: 'Sum of Weekly FTE Capacity for all active team members.',
    committed:     'Average weekly FTE allocated to Committed projects over the selected period.',
    firmSurplus:   'Total Capacity minus Committed FTE. Treats Planned work as free capacity.',
    netSurplus:    'Total Capacity minus both Committed and Planned FTE. Conservative view of available capacity.',
  },
  labels: {
    firmSurplus: 'Available Capacity',
    netSurplus:  'Available if Plan Holds',
  },
};

const DATE_TICK_FORMATTER = new Intl.DateTimeFormat(undefined, {
  month: 'short',
  day: 'numeric',
});

const DATE_TABLE_FORMATTER = new Intl.DateTimeFormat(undefined, {
  month: 'short',
  day: 'numeric',
  year: 'numeric',
});

// ── State ─────────────────────────────────────────────────────────────────────
let rawData       = null;   // { meta, people[], projects[], assignments[], summary[] }
let activeView    = 'trends';
let activeFY      = null;
let activeStart   = null;   // yyyy-MM-dd — start of selected period
let activeEnd     = null;   // yyyy-MM-dd — end of selected period
let showCompleted   = false;  // when true, Completed projects appear in project-level views
let projectColors   = {};     // project name → color, stable across all views
let personColors    = {};     // person name → color, stable across all views
let personCapMap    = {};     // person name → fte_capacity, built once on data load
let selectedPeople        = [];   // array of selected person names; empty = nobody selected
let cachedPeopleCheckboxes = [];  // kept in sync with the people-checkboxes container
let chart         = null;
let chartResizeObserver = null;
let chartResizeFrame = null;

const VIEW_CATEGORIES = {
  breakdown: ['person', 'project', 'workstream', 'budget', 'roles'],
  planning:  ['timeline', 'resource-planning'],
};

// Returns rawData.projects filtered by the current showCompleted toggle.
// All chart/table functions that operate at the project level use this.
function getVisibleProjects() {
  return rawData.projects.filter(p => showCompleted || p.status !== 'Completed');
}

// Returns rawData.assignments for only the currently visible projects.
function getVisibleAssignments() {
  const vis = new Set(getVisibleProjects().map(p => p.name));
  return rawData.assignments.filter(a => vis.has(a.project));
}

function openDisclosureGroup(toggleId, groupId, chevronId) {
  document.getElementById(groupId).style.display = '';
  document.getElementById(toggleId).setAttribute('aria-expanded', 'true');
  document.getElementById(chevronId).style.transform = 'rotate(-180deg)';
}

function wireDisclosureToggle(toggleId, groupId, chevronId, childViews) {
  document.getElementById(toggleId).addEventListener('click', () => {
    const btn     = document.getElementById(toggleId);
    const opening = btn.getAttribute('aria-expanded') !== 'true';

    if (opening) {
      openDisclosureGroup(toggleId, groupId, chevronId);
    } else {
      document.getElementById(groupId).style.display = 'none';
      btn.setAttribute('aria-expanded', 'false');
      document.getElementById(chevronId).style.transform = '';

      if (childViews.includes(activeView)) {
        activeView = 'trends';
        updateViewButtons();
        render();
      }
    }
  });
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  fetchData();

  const chartWrapper = document.getElementById('chart-wrapper');
  if (window.ResizeObserver && chartWrapper) {
    chartResizeObserver = new ResizeObserver(() => {
      queueChartResize();
    });
    chartResizeObserver.observe(chartWrapper);
  }

  document.addEventListener('click', event => {
    if (!event.target.closest('.metric-help')) {
      closeAllMetricHelp();
    }
  });

  document.addEventListener('focusin', event => {
    if (!event.target.closest('.metric-help')) {
      closeAllMetricHelp();
    }
  });

  document.addEventListener('keydown', event => {
    if (event.key === 'Escape') {
      closeAllMetricHelp();
    }
  });

  document.getElementById('refresh-btn')
    .addEventListener('click', fetchData);

  document.getElementById('show-completed')
    .addEventListener('change', e => {
      showCompleted = e.target.checked;
      render();
    });

  wireDisclosureToggle('analysis-toggle', 'analysis-group', 'analysis-chevron', VIEW_CATEGORIES.breakdown);
  wireDisclosureToggle('planning-toggle', 'planning-group', 'planning-chevron', VIEW_CATEGORIES.planning);

  document.getElementById('fy-filter')
    .addEventListener('change', e => {
      activeFY = e.target.value;
      setDefaultPeriod();
      render();
    });

  document.getElementById('period-preset')
    .addEventListener('change', e => applyPreset(e.target.value));

  document.getElementById('range-start')
    .addEventListener('change', e => {
      activeStart = e.target.value;
      if (activeEnd && activeEnd < activeStart) {
        activeEnd = addDays(activeStart, 7);
        document.getElementById('range-end').value = activeEnd;
      }
      render();
    });

  document.getElementById('range-end')
    .addEventListener('change', e => {
      activeEnd = e.target.value;
      if (activeStart && activeEnd < activeStart) {
        activeEnd = addDays(activeStart, 7);
        document.getElementById('range-end').value = activeEnd;
      }
      render();
    });

  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeView = btn.dataset.view;
      updateViewButtons();
      render();
    });
  });

  document.getElementById('people-select-all').addEventListener('click',  () => setAllPeopleChecked(true));
  document.getElementById('people-select-none').addEventListener('click', () => setAllPeopleChecked(false));
  document.getElementById('people-filter-btn').addEventListener('click', e => {
    e.stopPropagation();
    const panel = document.getElementById('people-filter-panel');
    panel.style.display = panel.style.display === 'none' ? '' : 'none';
  });
  document.addEventListener('click', e => {
    if (!document.getElementById('people-filter-wrapper').contains(e.target)) {
      document.getElementById('people-filter-panel').style.display = 'none';
    }
  });
});

// ── Data Fetching ─────────────────────────────────────────────────────────────
function fetchData() {
  setLoadingState(true);
  google.script.run
    .withSuccessHandler(onDataLoaded)
    .withFailureHandler(onDataError)
    .getCapacityData();
}

function onDataLoaded(d) {
  rawData = d;

  rawData.projects.forEach((p, i) => {
    projectColors[p.name] = CONFIG.palette[i % CONFIG.palette.length];
  });

  personColors = {};
  personCapMap = {};
  rawData.people.forEach((p, i) => {
    personColors[p.name] = CONFIG.palette[i % CONFIG.palette.length];
    personCapMap[p.name] = p.fte_capacity || 1;
  });

  selectedPeople = [];
  buildPeopleFilter();
  updatePeopleFilterLabel();
  setLoadingState(false);
  updateViewButtons();
  try {
    populateFYFilter();
  } catch (err) {
    console.error('Dashboard render error:', err);
    showError('Error rendering dashboard: ' + err.message);
  }
}

function onDataError(err) {
  console.error(err);
  showError('Failed to load capacity data. Please try refreshing.');
}

function setLoadingState(loading) {
  document.getElementById('loading').classList.toggle('hidden', !loading);
  document.getElementById('dashboard').classList.toggle('hidden', loading);
  document.getElementById('error').classList.add('hidden');
  document.getElementById('main-content').setAttribute('aria-busy', String(loading));
}

function showError(message) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('main-content').setAttribute('aria-busy', 'false');
  const el = document.getElementById('error');
  el.textContent = message;
  el.classList.remove('hidden');
  requestAnimationFrame(() => el.focus());
}

// ── FY + Period Controls ──────────────────────────────────────────────────────
function populateFYFilter() {
  const fySet = [...new Set(rawData.summary.map(r => r.fiscal_year))].sort();
  const select = document.getElementById('fy-filter');
  select.replaceChildren();

  fySet.forEach(fy => {
    const opt = document.createElement('option');
    opt.value = fy;
    opt.textContent = fy;  // textContent — safe
    select.appendChild(opt);
  });

  // Default to the FY containing today
  const today = new Date().toISOString().slice(0, 10);
  let defaultFY = fySet[0] || null;
  rawData.summary.forEach(r => { if (r.week <= today) defaultFY = r.fiscal_year; });
  activeFY = defaultFY;
  if (activeFY) select.value = activeFY;

  setDefaultPeriod();
}

function setDefaultPeriod() {
  document.getElementById('period-preset').value = 'quarter';
  applyPreset('quarter');
}

function applyPreset(preset) {
  const fyWeeks = rawData.summary
    .filter(r => r.fiscal_year === activeFY)
    .map(r => r.week);

  if (!fyWeeks.length) return;

  const customRange = document.getElementById('custom-range');

  if (preset === 'custom') {
    customRange.style.display = 'flex';
    // Seed inputs with the current range (or full year if unset)
    if (!activeStart || !activeEnd) {
      activeStart = fyWeeks[0];
      activeEnd   = fyWeeks[fyWeeks.length - 1];
    }
    document.getElementById('range-start').value = activeStart;
    document.getElementById('range-end').value   = activeEnd;
    render();
    return;
  }

  customRange.style.display = 'none';

  if      (preset === 'quarter')    [activeStart, activeEnd] = getCurrentQuarterBounds(fyWeeks);
  else if (preset === '4weeks')     [activeStart, activeEnd] = getLastNWeeksBounds(fyWeeks, 4);
  else if (preset === '8weeks')     [activeStart, activeEnd] = getLastNWeeksBounds(fyWeeks, 8);
  else if (preset === 'next4weeks') [activeStart, activeEnd] = getNextNWeeksBounds(fyWeeks, 4);
  else if (preset === 'next8weeks') [activeStart, activeEnd] = getNextNWeeksBounds(fyWeeks, 8);
  else                              { activeStart = fyWeeks[0]; activeEnd = fyWeeks[fyWeeks.length - 1]; }

  render();
}

function getCurrentQuarterBounds(fyWeeks) {
  const today = new Date().toISOString().slice(0, 10);
  const d = new Date(today + 'T12:00:00');
  const m = d.getMonth() + 1;
  const y = d.getFullYear();

  // Fiscal year quarters: Q1 Apr–Jun, Q2 Jul–Sep, Q3 Oct–Dec, Q4 Jan–Mar
  let qStart, qEnd;
  if      (m >= 4  && m <= 6)  { qStart = `${y}-04-01`; qEnd = `${y}-06-30`; }
  else if (m >= 7  && m <= 9)  { qStart = `${y}-07-01`; qEnd = `${y}-09-30`; }
  else if (m >= 10 && m <= 12) { qStart = `${y}-10-01`; qEnd = `${y}-12-31`; }
  else                          { qStart = `${y}-01-01`; qEnd = `${y}-03-31`; }

  const inQ = fyWeeks.filter(w => w >= qStart && w <= qEnd);
  return inQ.length ? [inQ[0], inQ[inQ.length - 1]] : [fyWeeks[0], fyWeeks[fyWeeks.length - 1]];
}

function getLastNWeeksBounds(fyWeeks, n) {
  const today = new Date().toISOString().slice(0, 10);
  const past  = fyWeeks.filter(w => w <= today);
  const slice = (past.length ? past : fyWeeks).slice(-n);
  return [slice[0], slice[slice.length - 1]];
}

function getNextNWeeksBounds(fyWeeks, n) {
  const today   = new Date().toISOString().slice(0, 10);
  const future  = fyWeeks.filter(w => w >= today);
  const slice   = (future.length ? future : fyWeeks).slice(0, n);
  return [slice[0], slice[slice.length - 1]];
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (!rawData || !activeFY || !activeStart || !activeEnd) return;

  const fyRows    = rawData.summary.filter(r => r.fiscal_year === activeFY);
  const rangeRows = fyRows.filter(r => r.week >= activeStart && r.week <= activeEnd);

  if (!fyRows.length) return;

  renderScorecards(rangeRows.length ? rangeRows : fyRows);

  document.getElementById('capacity-chart').style.cursor = '';

  if      (activeView === 'project')           renderByProject(rangeRows);
  else if (activeView === 'person')            renderByPerson(rangeRows);
  else if (activeView === 'workstream')        renderWorkstreamShare(rangeRows);
  else if (activeView === 'budget')            renderBudget(rangeRows);
  else if (activeView === 'roles')             renderByRole(rangeRows);
  else if (activeView === 'timeline')          renderTimeline();
  else if (activeView === 'resource-planning') renderResourcePlanning(rangeRows);
  else                                         renderTrends(rangeRows);
}

// ── Scorecards ────────────────────────────────────────────────────────────────
function renderScorecards(rows) {
  const n    = rows.length || 1;
  const avg  = key => round2(rows.reduce((s, r) => s + (r[key] || 0), 0) / n);

  const totalCap   = avg('total_capacity');
  const committed  = avg('committed');
  const firmSurp   = avg('firm_surplus');
  const netSurp    = avg('net_surplus');

  const cards = [
    {
      label:   'Total Capacity',
      value:   totalCap,
      border:  '#E9E8E8',
      tooltip: CONFIG.tooltips.totalCapacity,
    },
    {
      label:   'Committed',
      value:   committed,
      border:  CONFIG.status.committed,
      tooltip: CONFIG.tooltips.committed,
    },
    {
      label:   CONFIG.labels.firmSurplus,
      value:   firmSurp,
      border:  firmSurp > 0 ? CONFIG.surplus.pos : CONFIG.surplus.neg,
      tooltip: CONFIG.tooltips.firmSurplus,
    },
    {
      label:   CONFIG.labels.netSurplus,
      value:   netSurp,
      border:  netSurp > 0 ? CONFIG.surplus.pos : CONFIG.surplus.neg,
      tooltip: CONFIG.tooltips.netSurplus,
    },
  ];

  const container = document.getElementById('scorecards');
  container.replaceChildren();  // no innerHTML

  cards.forEach(({ label, value, border, tooltip }, index) => {
    const card = document.createElement('div');
    card.className = 'bg-white rounded-2xl border-2 p-5 shadow-sm';
    card.style.borderColor = border;

    // Label + info icon row
    const labelRow = document.createElement('div');
    labelRow.className = 'flex items-center gap-1 mb-1';

    const labelEl = document.createElement('p');
    labelEl.className = 'metric-label text-xs font-semibold uppercase tracking-widest';
    labelEl.textContent = label;  // textContent — safe

    const infoWrap = document.createElement('div');
    infoWrap.className = 'metric-help';
    infoWrap.dataset.open = 'false';

    const tipId = `metric-tip-${index}`;

    const screenReaderTip = document.createElement('span');
    screenReaderTip.id = tipId;
    screenReaderTip.className = 'sr-only';
    screenReaderTip.textContent = tooltip;

    const infoButton = document.createElement('button');
    infoButton.type = 'button';
    infoButton.className = 'metric-help__toggle';
    infoButton.setAttribute('aria-label', `More information about ${label}`);
    infoButton.setAttribute('aria-describedby', tipId);
    infoButton.setAttribute('aria-expanded', 'false');

    const infoIcon = document.createElement('span');
    infoIcon.setAttribute('aria-hidden', 'true');
    infoIcon.textContent = 'ⓘ';  // textContent — safe
    infoButton.appendChild(infoIcon);

    infoButton.addEventListener('click', event => {
      event.stopPropagation();
      const willOpen = infoWrap.dataset.open !== 'true';
      closeAllMetricHelp();
      infoWrap.dataset.open = String(willOpen);
      infoButton.setAttribute('aria-expanded', String(willOpen));
    });

    const tipEl = document.createElement('div');
    tipEl.className = 'metric-help__bubble';
    tipEl.setAttribute('aria-hidden', 'true');
    tipEl.textContent = tooltip;  // textContent — safe

    infoWrap.append(screenReaderTip, infoButton, tipEl);
    labelRow.append(labelEl, infoWrap);

    const valueEl = document.createElement('p');
    valueEl.className = 'text-3xl font-heading font-bold mt-1';
    valueEl.textContent = value.toFixed(2) + ' FTE';  // textContent — safe

    const subEl = document.createElement('p');
    subEl.className = 'metric-subtext text-xs mt-1';
    subEl.textContent = 'avg / week · selected period';

    card.append(labelRow, valueEl, subEl);
    container.appendChild(card);
  });
}

// ── By Project ────────────────────────────────────────────────────────────────
// Uses pre-aggregated summary data — three clear stacks: Committed / Planned / Pipeline.
// This directly answers the capacity signal question without per-project color ambiguity.
function renderByProject(rangeRows) {
  setText('chart-title', 'Weekly FTE by Status');
  setText('table-title', 'Projects');

  const weeks    = rangeRows.map(r => r.week);
  const datasets = [
    {
      label:           'Committed',
      data:            rangeRows.map(r => r.committed),
      backgroundColor: CONFIG.status.committed,
      stack:           'alloc',
    },
    {
      label:           'Planned',
      data:            rangeRows.map(r => r.planned),
      backgroundColor: CONFIG.status.planned,
      stack:           'alloc',
    },
    {
      label:           'Pipeline',
      data:            rangeRows.map(r => r.pipeline),
      backgroundColor: CONFIG.status.pipeline,
      stack:           'alloc',
    },
  ];

  addCapacityLine(datasets, rangeRows);
  renderChart(weeks, datasets, false);
  renderProjectTable();
}

// ── By Person ─────────────────────────────────────────────────────────────────
// Horizontal stacked bar: one bar per person, stacked by project.
// Values = utilization (avg weekly FTE / person capacity) so part-time staff
// are comparable to full-time — 1.0 means fully allocated for that person.
function renderByPerson(rangeRows) {
  setText('chart-title', 'Capacity Utilization by Person (selected period)');
  setText('table-title', 'Team Members');

  const weeks     = rangeRows.map(r => r.week);
  const periodLen = weeks.length || 1;
  const people    = rawData.people.map(p => p.name);

  // For each person + project, compute average weekly FTE over the period
  const personProject = {};
  people.forEach(n => { personProject[n] = {}; });

  getVisibleAssignments().forEach(a => {
    if (!personProject[a.person]) return;
    const overlap = weeks.filter(w => w >= a.start && w <= a.end).length;
    if (!overlap) return;
    const avg = round2((a.fte * overlap) / periodLen);
    personProject[a.person][a.project] = round2((personProject[a.person][a.project] || 0) + avg);
  });

  // Sort people by total utilization descending — most allocated first, most available last
  const sortedPeople = [...people].sort((a, b) => {
    const utilA = Object.values(personProject[a]).reduce((s, v) => s + v, 0) / personCapMap[a];
    const utilB = Object.values(personProject[b]).reduce((s, v) => s + v, 0) / personCapMap[b];
    return utilB - utilA;
  });

  // Only include projects that have at least some allocation in this period
  const activeProjects = getVisibleProjects()
    .filter(p => sortedPeople.some(n => (personProject[n][p.name] || 0) > 0));

  // Normalize each value by the person's capacity so 1.0 = fully allocated
  const datasets = activeProjects.map(p => ({
    label:           p.name,
    data:            sortedPeople.map(n => round2((personProject[n][p.name] || 0) / personCapMap[n])),
    rawFTE:          sortedPeople.map(n => personProject[n][p.name] || 0),
    backgroundColor: projectColors[p.name],
    stack:           'alloc',
  }));

  renderPersonChart(sortedPeople, datasets, personCapMap);
  renderPeopleTable(personProject);
}


// ── Trends ────────────────────────────────────────────────────────────────────

// Vertical gradient: green (low utilisation) → yellow (~80%) → red (~100%+).
// Positions are fractions 0=bottom (y:0) → 1=top (y:yMax) of the chart area.
function buildUtilGradient(canvasCtx, chartArea, yMax) {
  const grad = canvasCtx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
  const s = v => Math.max(0, Math.min(1, v / yMax));
  grad.addColorStop(0,      'rgba( 34, 197,  94, 0.05)'); // green – near zero
  grad.addColorStop(s(0.6), 'rgba( 34, 197,  94, 0.22)'); // green – comfortable
  grad.addColorStop(s(0.8), 'rgba(234, 179,   8, 0.38)'); // amber – approaching limit
  grad.addColorStop(s(1.0), 'rgba(239,  68,  68, 0.55)'); // red   – at capacity
  if (yMax > 1.0) {
    grad.addColorStop(1.0,  'rgba(239,  68,  68, 0.70)'); // deeper red if over capacity
  }
  return grad;
}

function renderTrends(rangeRows) {
  setText('chart-title', 'Capacity Utilization over Time');
  setText('table-title', 'Weekly Summary');

  const weeks = rangeRows.map(r => r.week);
  const pct   = (val, cap) => cap > 0 ? round2(val / cap) : 0;

  const datasets = [
    {
      label:       'Total Capacity',
      data:        rangeRows.map(() => 1),
      borderColor: CONFIG.capacity,
      borderWidth: 2,
      borderDash:  [6, 4],
      pointRadius: 0,
      fill:        false,
      tension:     0,
    },
    {
      label:           'Committed',
      data:            rangeRows.map(r => pct(r.committed, r.total_capacity)),
      rawFTE:          rangeRows.map(r => r.committed),
      borderColor:     CONFIG.status.committed,
      borderWidth:     2,
      pointRadius:     0,
      fill:            'origin',
      backgroundColor: ctx => {
        const { ctx: c, chartArea, scales } = ctx.chart;
        if (!chartArea) return 'rgba(34,197,94,0.15)';
        return buildUtilGradient(c, chartArea, scales.y?.max || 1.5);
      },
      tension:         0,
    },
    {
      label:       'Committed + Planned',
      data:        rangeRows.map(r => pct(r.committed + r.planned, r.total_capacity)),
      rawFTE:      rangeRows.map(r => r.committed + r.planned),
      borderColor: CONFIG.status.planned,
      borderWidth: 2,
      borderDash:  [3, 3],
      pointRadius: 0,
      fill:        false,
      tension:     0,
    },
  ];

  renderLineChart(weeks, datasets);
  renderTrendsTable(rangeRows);
}

function renderTrendsTable(rangeRows) {
  const pct = (val, cap) => cap > 0 ? (val / cap * 100).toFixed(0) + '%' : '—';

  const rows = rangeRows.map(r => [
    textNode(formatChartLabel(r.week, true)),
    textNode(r.total_capacity.toFixed(2) + ' FTE'),
    textNode(r.committed.toFixed(2)   + ' FTE  (' + pct(r.committed,   r.total_capacity) + ')'),
    textNode(r.firm_surplus.toFixed(2) + ' FTE  (' + pct(r.firm_surplus, r.total_capacity) + ')'),
    textNode(r.net_surplus.toFixed(2)  + ' FTE  (' + pct(r.net_surplus,  r.total_capacity) + ')'),
  ]);

  renderTable(
    ['Week', 'Total Capacity', 'Committed', CONFIG.labels.firmSurplus, CONFIG.labels.netSurplus],
    rows
  );
}

// ── Resource Planning ─────────────────────────────────────────────────────────
// Shows available FTE per person per week (capacity minus assigned), so the PM
// can see who has headroom and when — lines trending up = capacity opening up.
function renderResourcePlanning(rangeRows) {
  setText('chart-title', 'Available Capacity by Person Over Time');
  setText('table-title', '');
  document.getElementById('table-container').replaceChildren();

  const wrapper = document.getElementById('chart-wrapper');
  wrapper.style.height = '380px';

  if (!selectedPeople.length) {
    if (chart) { chart.destroy(); chart = null; }
    document.getElementById('capacity-chart').style.display = 'none';
    let hint = document.getElementById('rp-empty-hint');
    if (!hint) {
      hint = document.createElement('div');
      hint.id = 'rp-empty-hint';
      hint.style.cssText = 'height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:#6b7280';
      const h = document.createElement('span');
      h.style.cssText = 'font-size:1.1rem;font-weight:500';
      h.textContent = 'Select people to compare';
      const sub = document.createElement('span');
      sub.style.cssText = 'font-size:0.875rem;text-align:center';
      sub.textContent = "Use the People filter above, or click someone's bar in Breakdown \u2192 By Person";
      hint.appendChild(h);
      hint.appendChild(sub);
      wrapper.appendChild(hint);
    }
    hint.style.display = '';
    document.getElementById('chart-status').textContent = 'No people selected.';
    return;
  }

  const hint = document.getElementById('rp-empty-hint');
  if (hint) hint.style.display = 'none';
  document.getElementById('capacity-chart').style.display = '';

  const weeks = rangeRows.map(r => r.week);
  const activePeople = rawData.people.filter(p => selectedPeople.includes(p.name));

  const grid = buildFTEGrid(weeks, getVisibleAssignments(), a => a.person);

  const datasets = activePeople.map(p => ({
    label:       p.name,
    data:        weeks.map(w => round2(Math.max(0, personCapMap[p.name] - (grid[w][p.name] || 0)))),
    borderColor: personColors[p.name],
    borderWidth: 2,
    pointRadius: 2,
    fill:        false,
    tension:     0,
  }));

  renderLineChart(weeks, datasets, {
    yAxisTitle:   'Available FTE',
    tooltipLabel: ctx => ' ' + ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2) + ' FTE available',
  });
}

// ── Shared bullet/battery plugin ──────────────────────────────────────────────
// Draws a light gray "capacity shell" behind each bar before Chart.js renders
// the coloured assigned/allocated bar on top. Overflow past the shell is natural.
// Usage: add CAPACITY_CAP_PLUGIN to the chart plugins array and pass cap values
// via options.plugins.capacityCap.caps = [number, ...].
const CAPACITY_CAP_PLUGIN = {
  id: 'capacityCap',
  beforeDatasetsDraw(chart) {
    const caps = chart.options.plugins?.capacityCap?.caps;
    if (!caps?.length) return;
    const { ctx, scales } = chart;
    const meta = chart.getDatasetMeta(0);
    if (!meta?.data?.length) return;
    const x0 = scales.x.getPixelForValue(0);
    ctx.save();
    meta.data.forEach((bar, i) => {
      const cap = caps[i];
      if (!cap) return;
      const xC = scales.x.getPixelForValue(cap);
      ctx.fillStyle   = 'rgba(229,231,235,0.7)';
      ctx.fillRect(x0, bar.y - bar.height / 2, xC - x0, bar.height);
      ctx.strokeStyle = '#d1d5db';
      ctx.lineWidth   = 1;
      ctx.strokeRect(x0, bar.y - bar.height / 2, xC - x0, bar.height);
    });
    ctx.restore();
  },
};

// ── Budget vs Assigned ────────────────────────────────────────────────────────
function renderBudget(rangeRows) {

  getVisibleAssignments().forEach(a => {

  });

    type: 'bar',
    data: {
      labels,
      datasets: [{
        label:           'Avg Assigned',
        data:            assignData,
        backgroundColor: barColors,
        borderRadius:    3,
        borderSkipped:   false,
      }],
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      indexAxis:           'y',
      resizeDelay:         100,
      plugins: {
        legend: {
          display:  true,
          position: 'bottom',
          labels: {
            generateLabels: () => {
              const items = [
                { text: 'Committed', fillStyle: CONFIG.status.committed, strokeStyle: 'transparent', lineWidth: 0, hidden: false },
                { text: 'Planned',   fillStyle: CONFIG.status.planned,   strokeStyle: 'transparent', lineWidth: 0, hidden: false },
                { text: 'Pipeline',  fillStyle: CONFIG.status.pipeline,  strokeStyle: 'transparent', lineWidth: 0, hidden: false },
              ];
              if (showCompleted) items.push(
                { text: 'Completed', fillStyle: CONFIG.status.completed, strokeStyle: 'transparent', lineWidth: 0, hidden: false }
              );
              return items;
            },
            font:          { family: 'Open Sans', size: 12 },
            padding:       16,
            usePointStyle: true,
          },
        },
        capacityCap:   { caps: budgetData },
        tooltip: {
          callbacks: {
            title: items => items[0].label + ' (' + (projects[items[0].dataIndex]?.status || '') + ')',
            label: ctx  => {
              const i = ctx.dataIndex;
              return [
                ' Assigned: ' + assignData[i].toFixed(2) + ' FTE',
                ' Budget:   ' + budgetData[i].toFixed(2) + ' FTE',
              ];
            },
          },
        },
      },
      scales: {
        x: {

          max:   xMax,
          title: { display: true, text: 'FTE', font: { family: 'Inter', size: 12 } },
          ticks: { font: { family: 'Open Sans', size: 11 } },
        },

          ticks: {
            font: { family: 'Open Sans', size: 13 },
            callback: function(val) {
              const label = this.getLabelForValue(val);
              return typeof label === 'string' && label.length > 22

function renderBudgetTable(projects, assigned) {
  const statusColors = {
    Committed: { bg: '#E0F9F4', fg: '#0E7864' },
    Planned:   { bg: '#FFF8E1', fg: '#B45309' },
    Pipeline:  { bg: '#EDE7F6', fg: '#5B21B6' },
    Completed: { bg: '#F3F4F6', fg: '#6B7280' },
  };

  const rows = projects.map(p => {
    const a    = round2(assigned[p.name] || 0);
    const b    = round2(p.fte_budget     || 0);
    const diff = round2(a - b);
    const diffEl = document.createElement('span');
    diffEl.style.fontWeight = '600';
    diffEl.style.color = diff > 0.05 ? '#EB088A' : diff < -0.05 ? '#48C0D9' : '#6b7280';
    diffEl.textContent = (diff >= 0 ? '+' : '') + diff.toFixed(2) + ' FTE';
    return [
      textNode(p.name, 'font-medium'),
      textNode(p.workstream || '—'),
      badge(p.status, statusColors[p.status] || { bg: '#F5F5F5', fg: '#616161' }),
      textNode(b > 0 ? b.toFixed(2) + ' FTE' : '—'),
      textNode(a.toFixed(2) + ' FTE'),
      diffEl,
    ];
  });

  renderTable(['Project', 'Workstream', 'Status', 'Budget', 'Assigned', 'Δ'], rows);
}

// ── By Role ───────────────────────────────────────────────────────────────────

// Normalise role labels:
//   1. Replace "Applied Machine Learning" with "ML" anywhere in the string.
//   2. Strip any specialization suffix after a dash/en-dash/em-dash, e.g.:
//        "ML Scientist – Agents and Reasoning"    → "ML Scientist"
//        "Senior Software Developer – Machine Learning" → "Senior Software Developer"
// Seniority prefixes (Senior, Associate) are intentionally preserved.
function normalizeRole(role) {
  return role
    .replace(/Applied\s+Machine\s+Learning/gi, 'ML')
    .replace(/\s+[-\u2013\u2014]\s+.+$/u, '')   // strip " – <any specialization>"
    .trim();
}

function renderByRole(rangeRows) {
  setText('chart-title', 'Capacity & Allocation by Role (avg / week)');
  setText('table-title', 'Roles');

  const weeks     = rangeRows.map(r => r.week);
  const periodLen = weeks.length || 1;

  // Aggregate by normalised role label
  const roleCapacity = {};
  const rolePeople   = {};
  rawData.people.forEach(p => {
    if (!p.role) return;
    const r = normalizeRole(p.role);
    roleCapacity[r] = round2((roleCapacity[r] || 0) + (p.fte_capacity || 0));
    (rolePeople[r] = rolePeople[r] || []).push(p.name);
  });

  const personAssigned = {};
  getVisibleAssignments().forEach(a => {
    const overlap = weeks.filter(w => w >= a.start && w <= a.end).length;
    if (!overlap) return;
    personAssigned[a.person] = round2((personAssigned[a.person] || 0) + a.fte * overlap / periodLen);
  });

  const roleAssigned = {};
  rawData.people.forEach(p => {
    if (!p.role) return;
    const r = normalizeRole(p.role);
    roleAssigned[r] = round2((roleAssigned[r] || 0) + (personAssigned[p.name] || 0));
  });

  const roles   = Object.keys(roleCapacity).sort((a, b) => roleCapacity[b] - roleCapacity[a]);
  const capData = roles.map(r => roleCapacity[r]);
  const asgData = roles.map(r => round2(roleAssigned[r] || 0));
  // Colour each bar by utilisation level
  const barColors = roles.map((r, i) => {
    const pct = capData[i] > 0 ? asgData[i] / capData[i] : 0;
    return pct > 1 ? '#EB088A' : pct > 0.8 ? '#FF9E00' : '#48C0D9';
  });
  const xMax = round2(Math.max(...capData, ...asgData, 0.1) * 1.12);

  const wrapper = document.getElementById('chart-wrapper');
  wrapper.style.height = (roles.length * 48 + 140) + 'px';

  if (chart) { chart.destroy(); chart = null; }

  chart = new Chart(document.getElementById('capacity-chart'), {
    type: 'bar',
    data: {
      labels: roles,
      datasets: [{
        label:           'Assigned',
        data:            asgData,
        backgroundColor: barColors,
        borderRadius:    3,
        borderSkipped:   false,
      }],
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      indexAxis:           'y',
      resizeDelay:         100,
      plugins: {
        legend:       { display: false },
        capacityCap:  { caps: capData },
        tooltip: {
          callbacks: {
            label: ctx => {
              const i   = ctx.dataIndex;
              const pct = capData[i] > 0 ? (asgData[i] / capData[i] * 100).toFixed(0) + '%' : '—';
              return [
                ' Assigned: ' + asgData[i].toFixed(2) + ' FTE (' + pct + ')',
                ' Capacity: ' + capData[i].toFixed(2) + ' FTE',
              ];
            },
          },
        },
      },
      scales: {
        x: {
          beginAtZero: true,
          max:   xMax,
          title: { display: true, text: 'FTE', font: { family: 'Inter', size: 12 } },
          ticks: { font: { family: 'Open Sans', size: 11 } },
        },
        y: {
          ticks: { font: { family: 'Open Sans', size: 12 } },
        },
      },
    },
    plugins: [CAPACITY_CAP_PLUGIN],
  });

  queueChartResize();
  renderAccessibleChartData(roles,
    [{ label: 'Capacity', data: capData }, { label: 'Assigned', data: asgData }],
    true);
  renderRoleTable(roles, roleCapacity, roleAssigned, rolePeople);
}

function renderRoleTable(roles, roleCapacity, roleAssigned, rolePeople) {
  const rows = roles.map(r => {
    const cap   = roleCapacity[r] || 0;
    const asgnd = round2(roleAssigned[r] || 0);
    const pct   = cap > 0 ? asgnd / cap : 0;
    const color = pct > 1 ? '#EB088A' : pct > 0.8 ? '#FF9E00' : '#48C0D9';
    return [
      textNode(r, 'font-medium'),
      textNode(String((rolePeople[r] || []).length)),
      textNode(cap.toFixed(2) + ' FTE'),
      progressBar(asgnd, cap, color),
    ];
  });
  renderTable(['Role', 'Headcount', 'Total Capacity', 'Avg Assigned (period)'], rows);
}

// ── Timeline (Gantt) ──────────────────────────────────────────────────────────
// X axis zooms to the selected period; assignments are clipped to that range.
function renderTimeline() {
  if (!activeStart || !activeEnd) return;

  const MS_WEEK = 7 * 864e5;
  const minMs   = new Date(activeStart + 'T00:00:00').getTime();
  const maxMs   = new Date(activeEnd   + 'T00:00:00').getTime() + MS_WEEK;

  setText('chart-title', 'Assignment Timeline');
  setText('table-title', '');

  // Only people with at least one assignment (to a visible project) overlapping the period
  const _visAsgn   = getVisibleAssignments();
  const activePeople = rawData.people
    .filter(p => _visAsgn.some(
      a => a.person === p.name && a.end >= activeStart && a.start <= activeEnd))
    .map(p => p.name);

  // Build per-person FTE capacity and per-person+project average FTE for the period
  const fyWeeks      = rawData.summary
    .filter(r => r.fiscal_year === activeFY)
    .map(r => r.week);
  const periodWeeks  = fyWeeks.filter(w => w >= activeStart && w <= activeEnd);
  const periodLen    = periodWeeks.length || 1;


  const personProjectFTE = {};
  _visAsgn.forEach(a => {
    if (a.end < activeStart || a.start > activeEnd) return;
    const overlap = periodWeeks.filter(w => w >= a.start && w <= a.end).length;
    if (!overlap) return;
    if (!personProjectFTE[a.person]) personProjectFTE[a.person] = {};
    personProjectFTE[a.person][a.project] = round2(
      (personProjectFTE[a.person][a.project] || 0) + a.fte * overlap / periodLen
    );
  });

  // Merge multi-row assignments into a single span per person+project
  const spans = {};
  _visAsgn.forEach(a => {
    if (a.end < activeStart || a.start > activeEnd) return;
    if (!spans[a.person]) spans[a.person] = {};
    const s = spans[a.person];
    if (!s[a.project]) {
      s[a.project] = { start: a.start, end: a.end };
    } else {
      if (a.start < s[a.project].start) s[a.project].start = a.start;
      if (a.end   > s[a.project].end)   s[a.project].end   = a.end;
    }
  });

  const activeProjects = getVisibleProjects().filter(p =>
    activePeople.some(n => spans[n]?.[p.name])
  );

  const datasets = activeProjects.map(proj => ({
    label:           proj.name,
    data:            activePeople.map(n => {
      const span = spans[n]?.[proj.name];
      if (!span) return null;
      return [
        Math.max(new Date(span.start + 'T00:00:00').getTime(), minMs),
        Math.min(new Date(span.end   + 'T00:00:00').getTime() + MS_WEEK, maxMs),
      ];
    }),
    fteData:         activePeople.map(n => personProjectFTE[n]?.[proj.name] ?? null),
    backgroundColor: projectColors[proj.name] + 'bb',
    borderColor:     projectColors[proj.name],
    borderWidth:     1,
    borderRadius:    3,
    borderSkipped:   false,
  }));

  const rowHeight = Math.max(44, activeProjects.length * 18 + 8);
  const wrapper   = document.getElementById('chart-wrapper');
  wrapper.style.height = (activePeople.length * rowHeight + 160) + 'px';

  if (chart) { chart.destroy(); chart = null; }

  chart = new Chart(document.getElementById('capacity-chart'), {
    type: 'bar',
    data: { labels: activePeople, datasets },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      indexAxis:           'y',
      resizeDelay:         100,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { family: 'Open Sans', size: 12 }, padding: 16, usePointStyle: true },
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (!Array.isArray(ctx.raw)) return null;
              const [s, e] = ctx.raw;
              const fte    = ctx.dataset.fteData?.[ctx.dataIndex];
              const cap    = personCapMap[activePeople[ctx.dataIndex]];
              const fteStr = fte != null
                ? '  ' + fte.toFixed(2) + ' FTE (' + (fte / cap * 100).toFixed(0) + '% of capacity)'
                : '';
              return ' ' + ctx.dataset.label + ': '
                + DATE_TABLE_FORMATTER.format(new Date(s)) + ' → '
                + DATE_TABLE_FORMATTER.format(new Date(e - MS_WEEK))
                + fteStr;
            },
          },
        },
      },
      scales: {
        x: {
          type:  'linear',
          min:   minMs,
          max:   maxMs,
          ticks: {
            font:          { family: 'Open Sans', size: 11 },
            maxTicksLimit: 8,
            callback:      v => DATE_TICK_FORMATTER.format(new Date(v)),
          },
          grid: { display: false },
        },
        y: {
          ticks: { font: { family: 'Open Sans', size: 13 } },
        },
      },
    },
  });

  queueChartResize();

  const accessContainer = document.getElementById('chart-accessible-data');
  accessContainer.replaceChildren();
  const ap = document.createElement('p');
  ap.textContent = 'Assignment timeline for ' + activePeople.length + ' team members.';
  accessContainer.appendChild(ap);
  document.getElementById('chart-status').textContent =
    'Assignment timeline updated for ' + activePeople.length + ' team members.';

  // No table for Timeline
  document.getElementById('table-container').replaceChildren();
}

// ── Workstream Share (Donut) ──────────────────────────────────────────────────
function renderWorkstreamShare(rangeRows) {
  setText('chart-title', 'Workstream Mix — Allocation Share (selected period)');
  setText('table-title', 'Workstream Allocation');

  const weeks     = rangeRows.map(r => r.week);
  const periodLen = weeks.length || 1;

  const projWS = {};
  getVisibleProjects().forEach(p => { if (p.workstream) projWS[p.name] = p.workstream; });

  const wsTotals = {};
  getVisibleAssignments().forEach(a => {
    const ws = projWS[a.project];
    if (!ws) return;
    const overlap = weeks.filter(w => w >= a.start && w <= a.end).length;
    if (!overlap) return;
    wsTotals[ws] = round2((wsTotals[ws] || 0) + a.fte * overlap / periodLen);
  });

  const workstreams = [...new Set(getVisibleProjects().map(p => p.workstream).filter(Boolean))].sort();
  const data   = workstreams.map(ws => round2(wsTotals[ws] || 0));
  const colors = workstreams.map((_, i) => CONFIG.palette[i % CONFIG.palette.length]);

  renderDoughnutChart(workstreams, data, colors);
  renderWorkstreamShareTable(workstreams, wsTotals);
}

function renderDoughnutChart(labels, data, colors) {
  if (chart) { chart.destroy(); chart = null; }

  const wrapper = document.getElementById('chart-wrapper');
  wrapper.style.height = '380px';

  const total = data.reduce((s, v) => s + v, 0);

  chart = new Chart(document.getElementById('capacity-chart'), {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderColor:     '#ffffff',
        borderWidth:     2,
        hoverOffset:     10,
      }],
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      resizeDelay:         100,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { family: 'Open Sans', size: 12 }, padding: 16, usePointStyle: true },
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v   = ctx.parsed;
              const pct = total > 0 ? (v / total * 100).toFixed(1) + '%' : '—';
              return ' ' + ctx.label + ': ' + v.toFixed(2) + ' FTE (' + pct + ')';
            },
          },
        },
      },
    },
  });

  queueChartResize();

  // Custom accessible table for doughnut (no axis labels)
  const container = document.getElementById('chart-accessible-data');
  const statusEl  = document.getElementById('chart-status');
  const title     = document.getElementById('chart-title').textContent;
  container.replaceChildren();
  const summary = document.createElement('p');
  summary.textContent = title + '. ' + labels.length + ' workstreams shown.';
  container.appendChild(summary);
  const tbl  = document.createElement('table');
  const cap  = document.createElement('caption');
  cap.textContent = title + ' data';
  tbl.appendChild(cap);
  const thead = tbl.createTHead();
  const hr    = thead.insertRow();
  ['Workstream', 'Avg FTE / week', 'Share'].forEach(h => {
    const th = document.createElement('th');
    th.scope = 'col';
    th.textContent = h;
    hr.appendChild(th);
  });
  const tbody = tbl.createTBody();
  labels.forEach((lbl, i) => {
    const tr   = tbody.insertRow();
    const thEl = document.createElement('th');
    thEl.scope = 'row';
    thEl.textContent = lbl;
    tr.appendChild(thEl);
    tr.insertCell().textContent = data[i].toFixed(2);
    tr.insertCell().textContent = total > 0 ? (data[i] / total * 100).toFixed(1) + '%' : '—';
  });
  tbl.appendChild(tbody);
  container.appendChild(tbl);
  statusEl.textContent = title + ' updated.';
}

function renderWorkstreamShareTable(workstreams, wsTotals) {
  const total = workstreams.reduce((s, ws) => s + (wsTotals[ws] || 0), 0);

  const projCount = {};
  getVisibleProjects().filter(p => p.workstream).forEach(p => {
    projCount[p.workstream] = (projCount[p.workstream] || 0) + 1;
  });

  const rows = workstreams.map(ws => {
    const fte = round2(wsTotals[ws] || 0);
    return [
      textNode(ws, 'font-medium'),
      textNode(String(projCount[ws] || 0)),
      textNode(fte.toFixed(2) + ' FTE'),
      textNode(total > 0 ? (fte / total * 100).toFixed(1) + '%' : '—'),
    ];
  });
  renderTable(['Workstream', 'Projects', 'Avg Weekly FTE', 'Share'], rows);
}

        },
      },
      onClick: (event, elements) => {
        if (!elements.length) return;
        selectedPeople = [chart.data.labels[elements[0].index]];
        activeView = 'resource-planning';
        openDisclosureGroup('planning-toggle', 'planning-group', 'planning-chevron');
        syncPeopleFilterCheckboxes();
        updateViewButtons();
        render();
      },
    },
  });

  document.getElementById('capacity-chart').style.cursor = 'pointer';

  queueChartResize();
  renderAccessibleChartData(people, datasets, true);
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function renderChart(labels, datasets, horizontal) {
  if (chart) { chart.destroy(); chart = null; }

  // Size the wrapper div — Chart.js fills it via responsive:true/maintainAspectRatio:false.
  // Setting height on the canvas directly causes an infinite resize loop with responsive mode.
  const wrapper = document.getElementById('chart-wrapper');
  if (horizontal) {
    const rowHeight = 36;   // px per person bar
    const legendPad = 120;  // px for legend + x-axis title
    wrapper.style.height = (labels.length * rowHeight + legendPad) + 'px';
  } else {
    wrapper.style.height = '380px';
  }

  const xScale = {
    stacked: true,
    grid:    horizontal ? {} : { display: false },
    ticks:   { font: { family: 'Open Sans', size: 11 } },
  };
  if (horizontal) {
    xScale.title = { display: true, text: 'FTE', font: { family: 'Inter', size: 12 } };
  } else {
    xScale.ticks.maxTicksLimit = 13;
    xScale.ticks.callback = function(_, i) {
      return formatChartLabel(labels[i]);
    };
  }

  const yScale = {
    stacked: true,
    ticks:   { font: { family: 'Open Sans', size: 11 } },
  };
  if (!horizontal) {
    yScale.title = { display: true, text: 'FTE', font: { family: 'Inter', size: 12 } };
  }

  chart = new Chart(document.getElementById('capacity-chart'), {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      indexAxis:           horizontal ? 'y' : 'x',
      resizeDelay:         100,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font:          { family: 'Open Sans', size: 12 },
            padding:       16,
            usePointStyle: true,
          },
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = horizontal ? ctx.parsed.x : ctx.parsed.y;
              return ' ' + ctx.dataset.label + ': ' + v.toFixed(2) + ' FTE';
            },
          },
        },
      },
      scales: { x: xScale, y: yScale },
    },
  });

  queueChartResize();
  renderAccessibleChartData(labels, datasets, horizontal);
}

function renderLineChart(labels, datasets, opts = {}) {
  if (chart) { chart.destroy(); chart = null; }

  const wrapper = document.getElementById('chart-wrapper');
  wrapper.style.height = '380px';

  const defaultTooltipLabel = ctx => {
    const pctStr = (ctx.parsed.y * 100).toFixed(0) + '%';
    const raw    = ctx.dataset.rawFTE?.[ctx.dataIndex];
    return raw != null
      ? ' ' + ctx.dataset.label + ': ' + pctStr + ' (' + raw.toFixed(2) + ' FTE)'
      : ' ' + ctx.dataset.label + ': ' + pctStr;
  };

  chart = new Chart(document.getElementById('capacity-chart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      resizeDelay:         100,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { family: 'Open Sans', size: 12 }, padding: 16, usePointStyle: true },
        },
        tooltip: {
          callbacks: {
            title: items => formatChartLabel(labels[items[0].dataIndex], true),
            label: opts.tooltipLabel || defaultTooltipLabel,
          },
        },
      },
      scales: {
        x: {
          ticks: {
            font: { family: 'Open Sans', size: 11 },
            maxTicksLimit: 13,
            callback: (_, i) => formatChartLabel(labels[i]),
          },
          grid: { display: false },
        },
        y: {
          beginAtZero: true,
          ticks: {
            font:          { family: 'Open Sans', size: 11 },
            maxTicksLimit: 8,
          },
          title: { display: true, text: opts.yAxisTitle || 'Fraction of capacity', font: { family: 'Inter', size: 12 } },
        },
      },
    },
  });

  queueChartResize();
  renderAccessibleChartData(labels, datasets, false);
}

function addCapacityLine(datasets, rows) {
  const totalCapacity = rows[0]?.total_capacity || 0;
  datasets.push({
    type:        'line',
    label:       'Total Capacity',
    data:        rows.map(() => totalCapacity),
    borderColor: CONFIG.capacity,
    borderWidth: 2,
    borderDash:  [6, 4],
    pointRadius: 0,
    fill:        false,
    order:       -1,
  });
}

// ── Tables ────────────────────────────────────────────────────────────────────
function renderProjectTable() {
  const statusColors = {
    'Committed': { bg: '#E0F9F4', fg: '#0E7864' },
    'Planned':   { bg: '#FFF8E1', fg: '#B45309' },
    'Pipeline':  { bg: '#EDE7F6', fg: '#5B21B6' },
    'Completed': { bg: '#F3F4F6', fg: '#6B7280' },
  };

  const statusOrder = { 'Committed': 0, 'Planned': 1, 'Pipeline': 2, 'Completed': 3 };
  const sorted = [...getVisibleProjects()]
    .filter(p => p.name)
    .sort((a, b) => (statusOrder[a.status] ?? 4) - (statusOrder[b.status] ?? 4));

  const rows = sorted.map(p => [
    textNode(p.name, 'font-medium'),
    textNode(p.workstream || '—'),
    badge(p.status, statusColors[p.status] || { bg: '#F5F5F5', fg: '#616161' }),
    textNode(p.individually_funded),
    textNode(p.fte_budget != null ? Number(p.fte_budget).toFixed(2) + ' FTE' : '—'),
  ]);

  renderTable(['Project', 'Workstream', 'Status', 'Individually Funded', 'FTE Budget'], rows);
}

function renderPeopleTable(personProject) {
  const rows = rawData.people.map(p => {
    const total    = round2(Object.values(personProject[p.name] || {}).reduce((s, v) => s + v, 0));
    const capacity = personCapMap[p.name];
    const pct      = capacity > 0 ? total / capacity : 0;
    const color    = pct > 1   ? '#EB088A'
                   : pct > 0.8 ? '#FF9E00'
                   :              '#48C0D9';
    return [
      textNode(p.name, 'font-medium'),
      textNode(p.role, 'text-gray-500 text-sm'),
      progressBar(total, capacity, color),
    ];
  });

  renderTable(['Name', 'Role', 'Avg Weekly FTE (period)'], rows);
}


// ── Table Builder ─────────────────────────────────────────────────────────────
function renderTable(headers, rows) {
  const table = document.createElement('table');
  table.className = 'w-full text-sm';

  const caption = document.createElement('caption');
  caption.className = 'sr-only';
  caption.textContent = document.getElementById('table-title').textContent || 'Data table';
  table.appendChild(caption);

  const thead = table.createTHead();
  const hr    = thead.insertRow();
  headers.forEach(h => {
    const th = document.createElement('th');
    th.scope = 'col';
    th.className = 'table-header text-left py-2 px-3 text-xs font-semibold uppercase tracking-wider border-b border-gray-100';
    th.textContent = h;  // textContent — safe
    hr.appendChild(th);
  });

  const tbody = table.createTBody();
  rows.forEach(cells => {
    const tr = document.createElement('tr');
    tr.className = 'border-b border-gray-50 hover:bg-gray-50 transition-colors';
    cells.forEach((cell, index) => {
      const cellEl = document.createElement(index === 0 ? 'th' : 'td');
      cellEl.className = 'py-3 px-3 text-left';
      if (index === 0) {
        cellEl.scope = 'row';
      }
      cellEl.appendChild(cell);  // always a DOM node — no innerHTML risk
      tr.appendChild(cellEl);
    });
    tbody.appendChild(tr);
  });

  document.getElementById('table-container').replaceChildren(table);  // no innerHTML
}

// ── Cell / Node Builders ──────────────────────────────────────────────────────
function textNode(value, extraClass) {
  const span = document.createElement('span');
  if (extraClass) span.className = extraClass;
  span.textContent = value ?? '—';  // textContent — safe
  return span;
}

function badge(text, { bg, fg }) {
  const el = document.createElement('span');
  el.className = 'inline-block px-2 py-0.5 rounded-full text-xs font-semibold';
  el.style.backgroundColor = bg;
  el.style.color            = fg;
  el.textContent = text;  // textContent — safe
  return el;
}

function progressBar(allocated, capacity, barColor) {
  const wrap = document.createElement('div');
  wrap.className = 'flex items-center gap-2';

  const track = document.createElement('div');
  track.className = 'flex-1 bg-gray-100 rounded-full h-1.5 overflow-hidden';

  const fill = document.createElement('div');
  fill.className         = 'h-1.5 rounded-full progress-bar__fill';
  fill.style.width       = Math.min(allocated / capacity, 1) * 100 + '%';
  fill.style.backgroundColor = barColor;
  track.appendChild(fill);

  const label = document.createElement('span');
  label.className   = 'text-xs text-gray-500 w-16 text-right tabular-nums';
  label.textContent = allocated.toFixed(2) + ' / ' + capacity.toFixed(2);  // textContent — safe

  wrap.append(track, label);
  return wrap;
}

// ── Computation ───────────────────────────────────────────────────────────────
/**
 * Builds a { week → { groupKey → totalFTE } } grid from raw assignments.
 * keyFn returns the group key (project, person, workstream) or null to skip.
 */
function buildFTEGrid(weeks, assignments, keyFn) {
  const grid = {};
  weeks.forEach(w => { grid[w] = {}; });

  assignments.forEach(a => {
    const key = keyFn(a);
    if (!key) return;  // skip assignments with no valid grouping key
    weeks.forEach(w => {
      if (w >= a.start && w <= a.end) {
        grid[w][key] = round2((grid[w][key] || 0) + a.fte);
      }
    });
  });

  return grid;
}

// ── DOM Utilities ─────────────────────────────────────────────────────────────
function setText(id, text) {
  document.getElementById(id).textContent = text;  // textContent — safe
}

function applyActiveStyle(el, active) {
  el.style.backgroundColor = active ? '#EB088A' : '';
  el.style.color            = active ? '#ffffff' : '';
  el.style.fontWeight       = active ? '600'     : '';
}

function updateViewButtons() {
  document.querySelectorAll('.view-btn').forEach(btn => {
    const active = btn.dataset.view === activeView;
    applyActiveStyle(btn, active);
    btn.setAttribute('aria-pressed', String(active));
  });

  [
    ['analysis-toggle', VIEW_CATEGORIES.breakdown],
    ['planning-toggle', VIEW_CATEGORIES.planning],
  ].forEach(([id, views]) => {
    applyActiveStyle(document.getElementById(id), views.includes(activeView));
  });

  document.getElementById('people-filter-wrapper').style.display =
    activeView === 'resource-planning' ? '' : 'none';
}

// ── People Filter ─────────────────────────────────────────────────────────────
// Rebuilds the checkbox list from rawData.people. Safe to call on data refresh
// because replaceChildren() removes old checkboxes and their listeners.
// Static panel listeners (open/close, All/None) are wired once at DOMContentLoaded.
function buildPeopleFilter() {
  const container = document.getElementById('people-checkboxes');
  container.replaceChildren();
  cachedPeopleCheckboxes = [];

  rawData.people.forEach(p => {
    const label = document.createElement('label');
    label.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:0.875rem;color:#374151;cursor:pointer;width:100%';

    const cb = document.createElement('input');
    cb.type      = 'checkbox';
    cb.checked   = selectedPeople.includes(p.name);
    cb.value     = p.name;
    cb.className = 'rounded border-gray-300 text-v-magenta focus:ring-v-magenta';
    cb.addEventListener('change', onPeopleFilterChange);

    cachedPeopleCheckboxes.push(cb);
    label.appendChild(cb);
    label.appendChild(document.createTextNode(' ' + p.name));
    container.appendChild(label);
  });
}

function setAllPeopleChecked(checked) {
  cachedPeopleCheckboxes.forEach(cb => { cb.checked = checked; });
  onPeopleFilterChange();
}

function onPeopleFilterChange() {
  selectedPeople = cachedPeopleCheckboxes.filter(cb => cb.checked).map(cb => cb.value);
  updatePeopleFilterLabel();
  render();
}

function syncPeopleFilterCheckboxes() {
  cachedPeopleCheckboxes.forEach(cb => { cb.checked = selectedPeople.includes(cb.value); });
  updatePeopleFilterLabel();
}

function updatePeopleFilterLabel() {
  const n = selectedPeople.length, total = rawData.people.length;
  const label = n === 0      ? 'Select people'
              : n === total  ? `People (all ${total})`
              :                `People (${n} of ${total})`;
  document.getElementById('people-filter-label').textContent = label;  // textContent — safe
}

function closeAllMetricHelp() {
  document.querySelectorAll('.metric-help').forEach(wrap => {
    wrap.dataset.open = 'false';
    const toggle = wrap.querySelector('.metric-help__toggle');
    if (toggle) toggle.setAttribute('aria-expanded', 'false');
  });
}

function queueChartResize() {
  if (!chart) return;
  if (chartResizeFrame) {
    cancelAnimationFrame(chartResizeFrame);
  }
  chartResizeFrame = requestAnimationFrame(() => {
    chartResizeFrame = null;
    if (chart) chart.resize();
  });
}

function renderAccessibleChartData(labels, datasets, horizontal) {
  const container = document.getElementById('chart-accessible-data');
  const status = document.getElementById('chart-status');
  const title = document.getElementById('chart-title').textContent || 'Capacity chart';
  const dataSetsForTable = datasets.filter(dataset => Array.isArray(dataset.data));

  container.replaceChildren();

  const summary = document.createElement('p');
  summary.textContent = `${title}. ${labels.length} ${horizontal ? 'team members' : 'time periods'} shown. Values are listed in FTE.`;
  container.appendChild(summary);

  const table = document.createElement('table');

  const caption = document.createElement('caption');
  caption.textContent = `${title} data`;
  table.appendChild(caption);

  const thead = table.createTHead();
  const headerRow = thead.insertRow();

  const firstHeader = document.createElement('th');
  firstHeader.scope = 'col';
  firstHeader.textContent = horizontal ? 'Person' : 'Period';
  headerRow.appendChild(firstHeader);

  dataSetsForTable.forEach(dataset => {
    const th = document.createElement('th');
    th.scope = 'col';
    th.textContent = dataset.label;
    headerRow.appendChild(th);
  });

  const tbody = table.createTBody();
  labels.forEach((label, rowIndex) => {
    const tr = document.createElement('tr');

    const rowHeader = document.createElement('th');
    rowHeader.scope = 'row';
    rowHeader.textContent = horizontal ? label : formatChartLabel(label, true);
    tr.appendChild(rowHeader);

    dataSetsForTable.forEach(dataset => {
      const td = document.createElement('td');
      const value = Number(dataset.data[rowIndex] ?? 0);
      td.textContent = value.toFixed(2);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  container.appendChild(table);
  status.textContent = `${title} updated with ${labels.length} ${horizontal ? 'team members' : 'time periods'}.`;
}

function formatChartLabel(label, verbose) {
  const date = new Date(label + 'T12:00:00');
  if (Number.isNaN(date.getTime())) return label;
  return verbose ? DATE_TABLE_FORMATTER.format(date) : DATE_TICK_FORMATTER.format(date);
}

function round2(n) {
  return Math.round(n * 100) / 100;
}

function addDays(dateStr, days) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}
